name: Build

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Backend build
        working-directory: backend
        run: mvn -q -DskipTests package
      - name: Spring AI profile build
        working-directory: backend
        run: mvn -q -Pspring-ai-poc -DskipTests package
      - name: Spring AI Alibaba profile build
        working-directory: backend
        run: mvn -q -Pspring-ai-alibaba-poc -DskipTests package

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Frontend build
        working-directory: frontend
        run: npm run build
